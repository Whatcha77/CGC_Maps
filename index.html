<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Carte FTTH</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }
</style>

</head>
<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([49.75, 6.1], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);


// ✅ Test fetch + debug
fetch('FO_POP_GPS.csv')
.then(response => {

    console.log("Status:", response.status);

    if (!response.ok) {
        throw new Error("CSV pas accessible !");
    }

    return response.text();
})
.then(data => {

    console.log("CSV OK");

    var rows = data.split("\n");

    rows.slice(1).forEach(function(row){

        var cols = row.split(",");

        if(cols.length < 3) return;

        var name = cols[0];
        var lat = parseFloat(cols[1]);
        var lon = parseFloat(cols[2]);
        var adresseBrute = cols[3];

    // ✅ regex simple pour réorganiser adresse
        var match = adresseBrute.match(/(.+?)\s(\d+\w*)\s(L-\d+\s.+)/);
        
        var adresse;

        if (match) {
            var rue = match[1];
            var numero = match[2];
            var ville = match[3];

            adresse = numero + " " + rue + ", " + ville;
} else {
        // fallback si format différent
        adresse = adresseBrute;
}
``


    if(!isNaN(lat) && !isNaN(lon)){
    var marker = L.marker([lat, lon]).addTo(map);

    // ✅ popup (clic)
    marker.bindPopup(`
    <b>${name}</b><br>
    <span style="font-size:12px;color:gray">${adresse}</span>
`);
``

    // ✅ label (visible)
    marker.bindTooltip(name, {
        permanent: true,
        direction: "top",
        offset: [0, -5]
    
    //    L.marker([lat, lon])
    //.addTo(map)
    //.bindPopup(name)
    //.bindTooltip(name, {
    //    permanent: true,
    //    direction: "top",
    //    offset: [0, -5]
    });

        }
    });

})
.catch(err => {
    console.error(err);
    alert(err.message);
});

</script>

</body>
</html>
