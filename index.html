<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Carte FTTH</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }
</style>

</head>
<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([49.75, 6.1], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);


// ✅ Test fetch + debug
fetch('FO_POP_GPS.csv')
.then(response => {

    console.log("Status:", response.status);

    if (!response.ok) {
        throw new Error("CSV pas accessible !");
    }

    return response.text();
})
.then(data => {

    console.log("CSV OK");

    var rows = data.split("\n");

    rows.slice(1).forEach(function(row){

        var cols = row.split(",");

        if(cols.length < 3) return;

        var name = cols[0];
        var lat = parseFloat(cols[1]);
        var lon = parseFloat(cols[2]);

        if(!isNaN(lat) && !isNaN(lon)){
            L.marker([lat, lon])
                .addTo(map)
                .bindPopup(name);
        }
    });

})
.catch(err => {
    console.error(err);
    alert(err.message);
});

</script>

</body>
</html>
