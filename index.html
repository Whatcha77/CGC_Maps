<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Carte FTTH</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 🔍 Recherche (géocoder) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>



<style>
#map { height: 100vh; }

.leaflet-tooltip {
    font-size: 10px;
    background: white;
    border: 1px solid black;
}
</style>

</head>
<body>

<div id="map"></div>

<script>

// ✅ Carte
var map = L.map('map').setView([49.75, 6.1], 9);

// ✅ Fond
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);


// ✅ LAYERS
var fo_pop_layer = L.layerGroup();
var fibres_layer = L.layerGroup();
var cgc_pop_layer = L.layerGroup();


// ✅ Charger CSV FO_POP
fetch('FO_POP_GPS.csv')
.then(res => res.text())
.then(data => {

    var rows = data.split("\n");

    rows.slice(1).forEach(function(row){

        var cols = row.split(",");

        if(cols.length < 5) return;

        var name = cols[0];
        var lat = parseFloat(cols[1]);
        var lon = parseFloat(cols[2]);
        var adresseRue = cols[3];
        var adresseCode = cols[4];
        // reconstruire adresse complète
        var adresseBrute = adresseRue + ", " + adresseCode;



        if(isNaN(lat) || isNaN(lon)) return;

        // ✅ Format adresse
        var match = adresseBrute.match(/(.+?)\s(\d+\w*)\s(L-\d+\s.+)/);

        var adresse = adresseBrute;

        if(match){
            adresse = match[2] + " " + match[1] + ", " + match[3];
        }

        var marker = L.circleMarker([lat, lon], {
            radius: 6,
            color: "#008000",
            fillColor: "#00cc00",
            fillOpacity: 0.9,
            weight: 2
        });

        marker.bindPopup(`
            <b>${name}</b><br>
            <span style="color:gray">${adresse}</span>
        `);

        marker.bindTooltip(name, {
            permanent: false,
            direction: "top"
        });

        fo_pop_layer.addLayer(marker);

    });

}).catch(err => {
    console.error(err);
});

// ✅ Charger CSV CGC_POP
fetch('CGC_POP_GPS_01.csv')
.then(res => res.text())
.then(data => {

    var rows = data.split("\n");

    rows.slice(1).forEach(function(row){

        var cols = row.split(",");

        if(cols.length < 5) return;

        var name = cols[0];
        var lat = parseFloat(cols[1]);
        var lon = parseFloat(cols[2]);
        var adresseRue = cols[3];
        var adresseCode = cols[4];
        // reconstruire adresse complète
        var adresseBrute = adresseRue + ", " + adresseCode;

        if(isNaN(lat) || isNaN(lon)) return;
        
        // ✅ Format adresse
        var match = adresseBrute.match(/(.+?)\s(\d+\w*)\s(L-\d+\s.+)/);

        var adresse = adresseBrute;

        if(match){
            adresse = match[2] + " " + match[1] + ", " + match[3];
        }

        
        var marker = L.circleMarker([lat, lon], {
            radius: 6,
            color: "#cc0000",
            fillColor: "#ff0000",
            fillOpacity: 0.9,
            weight: 2
        });

        marker.bindPopup(`
            <b>${name}</b><br>
            ${adresseRue}<br>
            ${adresseCode}
        `);

        marker.bindTooltip(name, {
            permanent: false,
            direction: "top"
        });

        cgc_pop_layer.addLayer(marker);
        marker.options.title = name;
        searchLayer.addLayer(marker);

    });

});


// ✅ Exemple fibre (à remplacer par ton KMZ après)
var fibre1 = [
    [49.60667,6.10311],
    [49.60678,6.10303],
    [49.60684,6.10278],
    [49.60665,6.10217]
];

L.polyline(fibre1, {
    color: 'red',
    weight: 4
}).addTo(fibres_layer);


// ✅ Ajout des layers au contrôle
var baseMaps = {
    "OSM": osm
};


var overlayMaps = {
    "FO-POP": fo_pop_layer,
    "CGC POP": cgc_pop_layer,
    "Fibres": fibres_layer
};

L.control.layers(baseMaps, overlayMaps).addTo(map);


// ✅ Activer FO_POP par défaut
fo_pop_layer.addTo(map);
cgc_pop_layer.addTo(map);




// 🔍 ✅ SEARCH (comme dans ton code original)
L.Control.geocoder({
    defaultMarkGeocode: true
})
.on('markgeocode', function(e) {
    map.setView(e.geocode.center, 14);
})
.addTo(map);



</script>

</body>
</html>
